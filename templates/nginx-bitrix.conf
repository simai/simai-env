server {
    listen 80;
    server_name {{SERVER_NAME}};
    root {{DOC_ROOT}};
    client_max_body_size 64m;
    autoindex off;

    index index.php index.html;
    access_log /var/log/nginx/{{PROJECT_NAME}}.access.log;
    error_log /var/log/nginx/{{PROJECT_NAME}}.error.log;
    error_page 404 /404.php;

    location ^~ /.well-known/acme-challenge/ {
        alias {{ACME_ROOT}}/.well-known/acme-challenge/;
        default_type "text/plain";
        allow all;
    }

    location / {
        try_files $uri $uri/ /bitrix/urlrewrite.php?$args;
    }

    location ~* \.(?:css|js|gif|png|jpe?g)$ {
        expires 3d;
        try_files $uri =404;
    }

    # Bitrix hardening basics.
    location ~* /(bitrix/modules|bitrix/php_interface|bitrix/\.settings|\.settings\.php) {
        deny all;
    }

    location ~* /upload/.*\.php$ {
        deny all;
    }

    location = /healthcheck.php {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        try_files $fastcgi_script_name =404;
        set $path_info $fastcgi_path_info;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param REQUEST_SCHEME $scheme;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_SOFTWARE nginx/$nginx_version;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param REMOTE_USER $remote_user;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param REDIRECT_STATUS 200;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param REMOTE_USER $http_authorization;
        fastcgi_param REDIRECT_REMOTE_USER $http_authorization;
        fastcgi_pass unix:/run/php/php{{PHP_VERSION}}-fpm-{{PHP_SOCKET_PROJECT}}.sock;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        try_files $fastcgi_script_name =404;
        set $path_info $fastcgi_path_info;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param REQUEST_SCHEME $scheme;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_SOFTWARE nginx/$nginx_version;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param REMOTE_USER $remote_user;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param REDIRECT_STATUS 200;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param REMOTE_USER $http_authorization;
        fastcgi_param REDIRECT_REMOTE_USER $http_authorization;
        fastcgi_pass unix:/run/php/php{{PHP_VERSION}}-fpm-{{PHP_SOCKET_PROJECT}}.sock;
    }

    location ~ ^/\.(?!well-known/) {
        deny all;
    }
}
